<!doctype html>
<html>
  <head>
    <title>Pokévault | Home</title>
    <meta name="description" content="A Catalog of Pokemon Cards" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <!-- Navigation Bar -->
    <header class="main-header">
      <h1 class="title">Pokévault</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">Collection</a>
      </nav>
    </header>
    <!-- Pokemon Sets Bar -->
    <div class="pokemon-sets-container">
      <button class="scroll-button" onclick="document.querySelector('.sets-wrapper').scrollBy({ left: -800, behavior: 'smooth' })">
        ‹
      </button>
      <div class="sets-wrapper"> 
        <div class="sets-list">
          <div class="pokemon-set">
            <img src="assets/chaosRising.png" alt="Chaos Rising Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/perfectOrder.png" alt="Perfect Order Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/ascendedHeroes.png" alt="Ascended Heroes Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/phantasmalFlames.png" alt="Phantasmal Flames Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/megaEvolution.png" alt="Mega Evolution Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/blackBolt.png" alt="Black Bolt Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/whiteFlare.png" alt="White Flare Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/destinedRivals.png" alt="Destined Rivals Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/journeyTogether.png" alt="Journey Together Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/prismaticEvolutions.png" alt="Prismatic Evolutions Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/surgingSparks.png" alt="Surging Sparks Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/temporalForces.png" alt="Temporal Forces Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/shroudedFable.png" alt="Shrouded Fable Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/twilightMasquerade.png" alt="Twilight Masquerade Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/temporalForces.png" alt="Temporal Forces Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/paldeanFates.png" alt="Paldean Fates Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/paradoxRift.png" alt="Paradox Rift Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/151.png" alt="151 Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/obsidianFlames.png" alt="Obsidian Flames Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/paldeaEvolved.png" alt="Paldea Evolved Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/scarletViolet.png" alt="Scarlet & Violet Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/crownZenith.png" alt="Crown Zenith Logo">
          </div>
          <div class="pokemon-set">
            <img src="assets/silverTempest.png" alt="Silver Tempest Logo">
          </div>
        </div>
      </div> 
      <button class="scroll-button" onclick="document.querySelector('.sets-wrapper').scrollBy({ left: 800, behavior: 'smooth' })">
        ›
      </button>
    </div>
    <!-- Search Bar-->
    <div class="search-container">
      <input type="text" id="search-input" placeholder="Search for a card..." />
      <button id="search-button">Search</button>
    </div>
    <!-- Main Content -->
    <div class="main-content">
      <!-- Filter Bar -->
      <div class="filter-bar">
        <h3>Filter</h3>
        
        <!-- Card Type Filter -->
        <div class="filter-section">
          <h4>Card Type</h4>
          <select id="card-type-filter">
            <option value="">All Card Types</option>
            <option value="Pokemon">Pokémon</option>
            <option value="Trainer">Trainer</option>
          </select>
        </div>
        
        <!-- Pokémon Type Filter -->
        <div class="filter-section">
          <h4>Pokémon Type</h4>
            <label><input class="fire" type="checkbox"><span class="type fire">Fire</span></label>
            <label><input class="water" type="checkbox"><span class="type water">Water</span></label>
            <label><input class="grass" type="checkbox"><span class="type grass">Grass</span></label>
            <label><input class="electric" type="checkbox"><span class="type electric">Electric</span></label>
            <label><input class="psychic" type="checkbox"><span class="type psychic">Psychic</span></label>
            <label><input class="fighting" type="checkbox"><span class="type fighting">Fighting</span></label>
            <label><input class="dark" type="checkbox"><span class="type dark">Dark</span></label>
            <label><input class="metal" type="checkbox"><span class="type metal">Metal</span></label>
            <label><input class="colorless" type="checkbox"><span class="type colorless">Colorless</span></label>
            <label><input class="type fairy" type="checkbox"><span class="type fairy">Fairy</span></label>
            <label><input class="type dragon" type="checkbox"><span class="type dragon">Dragon</span></label>
        </div>

        <!-- Card Rarity Filter -->
        <div class="filter-section">
          <h4>Card Rarity</h4>
          <label><input class="rarity" type="checkbox"> Common</label>
          <label><input class="rarity" type="checkbox"> Uncommon</label>
          <label><input class="rarity" type="checkbox"> Rare</label>
          <label><input class="rarity" type="checkbox"> Ultra Rare</label>
        </div>
      </div>
      <!-- Card Grid -->
       <div id="card-container"></div>
    </div>

    <!-- Card Template -->
    <div class="card" style="display: none">
      <div class="card-content">
        <h2>Card Name</h2>
        <img src="" alt="Pokemon Card" />
      </div>
    </div>

    <!-- <div class="footer">
      <button onclick="quoteAlert()">Get A Quote!</button>
      <button onclick="removeLastCard()">Remove A Card!</button>
    </div> -->
  </body>
</html>
